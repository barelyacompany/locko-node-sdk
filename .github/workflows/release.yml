name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Test, Build & Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Check version not already published
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          if npm view "@barelyacompany/locko@${VERSION}" version 2>/dev/null | grep -q .; then
            echo "::error::Version ${VERSION} is already published on npm. Aborting."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
